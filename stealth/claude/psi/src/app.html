<!doctype html>
<html lang="pt-BR" %sveltekit.theme%>
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Psi — Plataforma SaaS para clínicas de psicologia" />

		<!-- Evita flash de tema (dark mode). Deve rodar antes de qualquer CSS. -->
		<script>
			(function () {
				try {
					const stored = localStorage.getItem('psi-theme');
					const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
					const dark = stored ? stored === 'dark' : prefersDark;
					if (dark) document.documentElement.classList.add('dark');
				} catch (_) {}
			})();
		</script>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-bg text-ink dark:bg-bg-dark dark:text-bg">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
